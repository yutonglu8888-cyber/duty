<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>美术馆值班管理系统</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root { --border-color: #b5d5c5; --header-bg: #8ba870; --monday-bg: #fff5e6; --save-bg: #ffb74d; }
        body { font-family: -apple-system, "Helvetica Neue", "PingFang SC", sans-serif; background: #fdfaf5; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 15px rgba(139,168,112,0.15); padding: 15px; width: 100%; max-width: 1000px; margin-bottom: 15px; box-sizing: border-box; border: 1px solid #f0eee9; }
        h3 { margin: 0 0 12px 0; font-size: 16px; color: #5d6d4e; display: flex; align-items: center; gap: 6px; }
        
        /* 录入布局 */
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 12px; }
        input, select { width: 100%; padding: 10px; border: 2px solid #e8f0e8; border-radius: 10px; font-size: 14px; box-sizing: border-box; outline: none; -webkit-appearance: none; }
        
        /* 按钮通用行布局 */
        .button-row { display: flex; gap: 8px; width: 100%; }
        .btn { border: none; border-radius: 10px; padding: 12px 2px; font-weight: bold; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 4px; transition: all 0.2s; flex: 1; min-width: 0; }
        .btn:active { transform: scale(0.95); }
        
        .btn-add { background: var(--header-bg); color: white; }
        .btn-save { background: var(--save-bg); color: white; }
        .btn-excel { background: #66bb6a; color: white; }
        .btn-img { background: #ba68c8; color: white; }
        .btn-print { background: #78909c; color: white; }

        /* 表格区域 */
        .calendar-container { padding: 0; overflow: hidden; }
        .calendar-title { background: var(--header-bg); color: #fff; text-align: center; padding: 12px; font-size: 18px; font-weight: bold; }
        .grid-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(120px, 1fr)); border-left: 1px solid var(--border-color); border-top: 1px solid var(--border-color); min-width: 800px; }
        .weekday-header { background: #eef5ee; padding: 10px 2px; text-align: center; font-weight: bold; border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); font-size: 13px; color: #666; }
        
        .day-cell { min-height: 100px; background: #fff; border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); padding: 5px; }
        .date-num { font-size: 12px; color: #aaa; text-align: center; margin-bottom: 6px; }
        .closed { background: var(--monday-bg); }
        .closed-text { text-align: center; color: #c0a478; font-size: 14px; margin-top: 20px; font-style: italic; }

        .duty-item { display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 6px; font-size: 12px; padding: 4px 2px; border-bottom: 1px dotted #f0f0f0; white-space: nowrap; }
        .name-part { font-weight: bold; color: #333; min-width: 42px; }
        .time-part { color: #444; text-align: left; }
        .del-btn { color: #ff8a80; font-size: 18px; cursor: pointer; padding-left: 4px; }

        /* --- 手机端适配 --- */
        @media screen and (max-width: 600px) {
            .input-grid { grid-template-columns: 1fr 1fr; }
            /* 确保底部按钮也是并排一行 */
            .manage-row { display: flex; gap: 8px; } 
            
            .grid-wrapper { overflow-x: visible; }
            .calendar-grid { grid-template-columns: 1fr; border-top: none; min-width: 100%; }
            .weekday-header { display: none; }
            .day-cell { min-height: auto; display: flex; align-items: center; padding: 12px; border-left: 1px solid var(--border-color); }
            .date-num { width: 45px; margin-bottom: 0; border-right: 1px solid #f0f0f0; margin-right: 12px; color: #555; font-size: 14px; }
            .duty-list { flex: 1; }
        }

        @media print { .no-print { display: none !important; } .card { box-shadow: none; border: none; } .calendar-grid { min-width: 100%; } }
    </style>
</head>
<body>

    <div class="card no-print">
        <h3>🐾 快速排班录入</h3>
        <div class="input-grid">
            <input type="month" id="targetMonth" value="2026-04" onchange="initCalendar(); loadFromLocal();">
            <input type="date" id="dutyDate">
            <input type="text" id="staffName" placeholder="姓名">
            <select id="dutyTime">
                <option value="9:00-17:00">9:00-17:00</option>
                <option value="9:00-13:30">9:00-13:30</option>
                <option value="13:30-17:00">13:30-17:00</option>
                
            </select>
        </div>
        <div class="button-row">
            <button class="btn btn-add" onclick="addDuty()">✨ 添加</button>
            <button class="btn btn-save" onclick="saveToLocal(true)">⭐ 保存</button>
        </div>
    </div>

    <div class="card calendar-container" id="captureArea">
        <div class="calendar-title" id="calTitle">美术馆值班表</div>
        <div class="grid-wrapper">
            <div class="calendar-grid">
                <div class="weekday-header">周一</div><div class="weekday-header">周二</div><div class="weekday-header">周三</div>
                <div class="weekday-header">周四</div><div class="weekday-header">周五</div><div class="weekday-header">周六</div><div class="weekday-header">周日</div>
                <div id="daysContainer" style="display: contents;"></div>
            </div>
        </div>
    </div>

    <div class="card no-print">
        <h3>🚀 导出与分享</h3>
        <div class="button-row manage-row">
            <button class="btn btn-excel" onclick="exportExcel()">📊 导出Excel</button>
            <button class="btn btn-img" onclick="exportImage()">📸 存成图片</button>
            <button class="btn btn-print" onclick="window.print()">🖨️ 打印表格</button>
        </div>
    </div>

<script>
    window.onload = () => { initCalendar(); loadFromLocal(); };

    function initCalendar() {
        const monthVal = document.getElementById('targetMonth').value;
        const [year, month] = monthVal.split('-').map(Number);
        document.getElementById('calTitle').innerText = `🎨 美术馆 ${year}年${month}月值班表`;
        document.getElementById('dutyDate').value = `${monthVal}-01`;

        const firstDay = new Date(year, month - 1, 1).getDay(); 
        const adjustedFirstDay = (firstDay === 0) ? 6 : firstDay - 1; 
        const daysInMonth = new Date(year, month, 0).getDate();
        
        const container = document.getElementById('daysContainer');
        container.innerHTML = "";

        for (let i = 0; i < adjustedFirstDay; i++) {
            container.innerHTML += '<div class="day-cell no-print" style="background:#fcfcfc"></div>';
        }

        for (let d = 1; d <= daysInMonth; d++) {
            const currentIdx = (adjustedFirstDay + d - 1) % 7;
            const isMonday = currentIdx === 0;
            const dateId = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            
            let cellHtml = `<div class="day-cell ${isMonday ? 'closed' : ''}" id="cell-${dateId}" data-date="${dateId}">`;
            cellHtml += `<div class="date-num">${month}/${d}</div>`;
            if (isMonday) {
                cellHtml += `<div class="closed-text">休息哒</div>`;
            } else {
                cellHtml += `<div class="duty-list"></div>`;
            }
            cellHtml += `</div>`;
            container.innerHTML += cellHtml;
        }
    }

    function addDuty(name = "", time = "", dateInput = "") {
        const staffName = name || document.getElementById('staffName').value.trim();
        const date = dateInput || document.getElementById('dutyDate').value;
        const dutyTime = time || document.getElementById('dutyTime').value;

        if (!staffName) return;
        const targetCell = document.querySelector(`#cell-${date} .duty-list`);
        if (!targetCell) return;

        const item = document.createElement('div');
        item.className = 'duty-item';
        item.innerHTML = `
            <span class="name-part" contenteditable="true" spellcheck="false" onblur="saveToLocal(false)">${staffName}</span>
            <span class="time-part" contenteditable="true" spellcheck="false" onblur="saveToLocal(false)">${dutyTime}</span>
            <span class="del-btn no-print" onclick="this.parentElement.remove(); saveToLocal(false);">×</span>
        `;
        targetCell.appendChild(item);
        if(!name) { document.getElementById('staffName').value = ""; saveToLocal(false); }
    }

    function saveToLocal(showAlert) {
        const monthKey = document.getElementById('targetMonth').value;
        const data = [];
        document.querySelectorAll('.day-cell:not(.closed)').forEach(cell => {
            const date = cell.getAttribute('data-date');
            cell.querySelectorAll('.duty-item').forEach(item => {
                data.push({ date: date, name: item.children[0].innerText, time: item.children[1].innerText });
            });
        });
        localStorage.setItem('museum_duty_' + monthKey, JSON.stringify(data));
        if(showAlert) alert("保存成功啦！✨");
    }

    function loadFromLocal() {
        const monthKey = document.getElementById('targetMonth').value;
        const saved = localStorage.getItem('museum_duty_' + monthKey);
        if (saved) {
            const data = JSON.parse(saved);
            data.forEach(item => addDuty(item.name, item.time, item.date));
        }
    }

    function exportExcel() {
        const rows = [["日期", "姓名", "时间"]];
        document.querySelectorAll('.day-cell').forEach(cell => {
            const date = cell.getAttribute('data-date');
            if(!date) return;
            if(cell.classList.contains('closed')) {
                rows.push([date, "闭馆", "-"]);
            } else {
                cell.querySelectorAll('.duty-item').forEach(item => {
                    rows.push([date, item.children[0].innerText, item.children[1].innerText]);
                });
            }
        });
        const ws = XLSX.utils.aoa_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "值班表");
        XLSX.writeFile(wb, `美术馆值班表.xlsx`);
    }

    function exportImage() {
        html2canvas(document.getElementById('captureArea'), { scale: 3 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `值班表.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
